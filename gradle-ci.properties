# Gradle CI optimizations
# This file is copied to gradle.properties at workflow time to enable
# CI-only flags without contaminating the developer-facing gradle.properties.

# JVM: more headroom for parallel builds and KSP/Kotlin tasks.
org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=1g -Dfile.encoding=UTF-8

# Build performance
org.gradle.parallel=true
org.gradle.caching=true
org.gradle.configureondemand=false
org.gradle.daemon=false

# Kotlin / KSP
kotlin.incremental=true
kotlin.daemon.jvm.options=-Xmx2g
ksp.incremental=true

# AndroidX
android.useAndroidX=true
android.nonTransitiveRClass=true

# Suppress noisy warnings during CI (does not hide real errors)
org.gradle.warning.mode=summary
