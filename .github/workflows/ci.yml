name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

# All actions pinned to the latest published tag. Verified via
#   gh api repos/<repo>/tags --jq '.[0].name'
# Major tags for GitHub-official actions (auto-update within major),
# exact tags for external actions (reproducible).

jobs:
  unit-tests:
    name: 🧪 Unit tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply CI Gradle properties
        run: |
          chmod +x ./gradlew
          cp gradle-ci.properties gradle.properties
          echo "GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Non-master branches read the cache but never write back.
          # This is THE main fix for the "97 cache files" bloat: without
          # this, every PR created its own cache scope and the repo hit
          # the cache quota on almost every run.
          cache-read-only: ${{ github.ref_name != 'master' }}
          # Evict stale ~/.gradle entries before saving so the cache stays
          # small and reusable across runs/refs.
          cache-cleanup: always

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest :app:koverXmlReportDebug :app:koverHtmlReportDebug :app:koverVerifyDebug

      - name: Cobertura → resumen del run
        if: always()
        run: |
          XML=app/build/reports/kover/reportDebug.xml
          if [ -f "$XML" ]; then
            echo "## 🧪 Cobertura de líneas (unit)" >> "$GITHUB_STEP_SUMMARY"
            awk -F'"' '/type="LINE"/{m=$4;c=$6} END{t=m+c; if(t>0) printf "- **%d%%** (%d/%d líneas) — gate mínimo: 20%%\n", c*100/t, c, t}' "$XML" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Publish test results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Unit test results
          files: app/build/test-results/testDebugUnitTest/**/*.xml



  build:
    name: 🏗️ Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply CI Gradle properties
        run: |
          chmod +x ./gradlew
          cp gradle-ci.properties gradle.properties
          echo "GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref_name != 'master' }}
          cache-cleanup: always

      - name: Assemble debug
        run: ./gradlew :app:assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v7
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  static-analysis:
    name: 🔍 Static analysis ktlint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply CI Gradle properties
        run: |
          chmod +x ./gradlew
          cp gradle-ci.properties gradle.properties
          echo "GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref_name != 'master' }}
          cache-cleanup: always

      - name: ktlint
        run: ./gradlew :app:ktlintCheck

  instrumented-tests:
    name: 📱 Instrumented (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 30, 34]
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Apply CI Gradle properties
        run: |
          chmod +x ./gradlew
          cp gradle-ci.properties gradle.properties
          echo "GRADLE_OPTS=-Dorg.gradle.daemon=false -Dorg.gradle.parallel=true -Dorg.gradle.caching=true" >> "$GITHUB_ENV"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: ${{ github.ref_name != 'master' }}
          cache-cleanup: always

      # AVD cache: the previous config had no restore-keys and used a
      # static key without a content hash, so any content drift (UIDs,
      # fastboot snapshots, platform data) forced a full re-download +
      # re-upload — feeding the cache quota. Now the key includes a hash
      # of the files that actually influence the AVD content, and the
      # restore-keys give us a graceful fallback.
      - name: Cache AVD
        uses: actions/cache@v6
        id: avd-cache
        with:
          path: |
            ~/.android/avd
            ~/.android/adb
          key: avd-${{ matrix.api-level }}-${{ runner.os }}-${{ hashFiles('app/build.gradle.kts', 'gradle/libs.versions.toml', '.github/workflows/ci.yml') }}
          restore-keys: |
            avd-${{ matrix.api-level }}-${{ runner.os }}-
            avd-${{ matrix.api-level }}-

      - name: Create AVD snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "AVD snapshot listo para API ${{ matrix.api-level }}"

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: ./gradlew :app:connectedDebugAndroidTest

      - name: Publish instrumented results
        if: always()
        uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          check_name: Instrumented results (API ${{ matrix.api-level }})
          files: app/build/outputs/androidTest-results/connected/**/*.xml

      - name: Upload instrumented report
        if: failure()
        continue-on-error: true
        uses: actions/upload-artifact@v7
        with:
          name: instrumented-report-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/connected/
          retention-days: 7

  summary:
    name: 🧾 CI summary
    runs-on: ubuntu-latest
    needs: [static-analysis, unit-tests, build, instrumented-tests]
    if: always()
    steps:
      - name: Tabla resumen del pipeline
        run: |
          {
            echo "## 🧾 Resumen del pipeline"
            echo ""
            echo "| Etapa | Resultado |"
            echo "|---|---|"
            echo "| 🔍 Static analysis (ktlint) | ${{ needs.static-analysis.result == 'success' && '✅ pass' || format('❌ {0}', needs.static-analysis.result) }} |"
            echo "| 🧪 Unit tests + coverage gate | ${{ needs.unit-tests.result == 'success' && '✅ pass' || format('❌ {0}', needs.unit-tests.result) }} |"
            echo "| 🏗️ Assemble debug | ${{ needs.build.result == 'success' && '✅ pass' || format('❌ {0}', needs.build.result) }} |"
            echo "| 📱 Instrumented (API 26/30/34) | ${{ needs.instrumented-tests.result == 'success' && '✅ pass' || format('❌ {0}', needs.instrumented-tests.result) }} |"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Marcar rojo si algo falló
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: |
          echo "Algún job del pipeline falló — revisa la tabla del Summary." >&2
          exit 1
